name: Tests

# Runs the pytest suite on every push to main and every pull request, so
# logic regressions — like the publish-pipeline divergence that re-sent the
# newsletter every week — are caught before they ship. The regression guards
# in tests/test_publish_workflow_consistency.py only have teeth if this runs.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      MPLBACKEND: Agg          # headless runner: never touch a GUI backend
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install system libraries (libcairo for cairosvg chart PNGs)
        run: sudo apt-get update && sudo apt-get install -y libcairo2

      - name: Install dependencies
        run: pip install -r requirements.txt

      # The full UN dataset (data/*.csv) is gitignored, so it is absent here.
      # tests/conftest.py detects that and skips the data-dependent Flask
      # endpoint tests automatically; the logic/unit suite (synthetic fixtures)
      # runs in full, and pytest.ini's default `-m "not slow"` skips the
      # model-training tests. The live-scraper tests (data_fetcher*) need a
      # real browser + network, so they're excluded from this fast lane.
      - name: Run test suite
        run: |
          pytest -q \
            --ignore=tests/test_data_fetcher_merge.py \
            --ignore=tests/test_data_fetcher_marc.py
