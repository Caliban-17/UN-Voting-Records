name: Publish Weekly Atlas to Substack

# Composes the Weekly Atlas newsletter on a schedule and emails it to your
# Substack publication inbox (publish@<yourpub>.substack.com), where Substack
# converts the inbound email into a draft post you can review and publish.
#
# Schedule reasoning (see README "Publishing schedule"):
#   • Mon 22:00 UTC — pull the latest UN votes (refresh-data.yml)
#   • Tue 09:00 UTC — compose + email to Substack inbox
# Tuesday morning hits UK 09:00, EU 10:00–11:00, US East overnight, Tokyo evening
# — the highest-open window for a global IR/diplomacy audience.

on:
  workflow_dispatch:
    inputs:
      recent_year:
        description: "Year for the lead edition (default: latest in dataset)"
        required: false
      baseline_window:
        description: "Years of baseline to compare against"
        required: false
        default: "3"
      country:
        description: "Optional ISO-3 country focus (e.g. ARG)"
        required: false
      dry_run:
        description: "Compose only — do not send any email"
        required: false
        default: "false"
      recipient_override:
        description: "Send to this address instead of the Substack inbox (use to test pipeline against your own Gmail)"
        required: false
  schedule:
    # Tuesday 09:00 UTC — see README "Publishing schedule".
    - cron: "0 9 * * 2"

concurrency:
  group: publish-newsletter
  cancel-in-progress: false

jobs:
  # Decide which editions to compose this run: the global edition ("") plus a
  # curated set of per-country editions — OR a single country when one is given
  # via workflow_dispatch. The composer already supports country_focus end to
  # end (slug, ledger key, email), so this just fans the existing pipeline out.
  plan:
    runs-on: ubuntu-latest
    outputs:
      focuses: ${{ steps.set.outputs.focuses }}
    env:
      # Global edition is "". Add/remove ISO-3 codes to change which country
      # editions ship each week. Per-country editions dedup INDEPENDENTLY of the
      # global one (the ledger keys on country_focus), so most weeks they skip
      # until that country's own data moves — they won't spam the inbox.
      COUNTRY_EDITIONS: '["", "ARG", "ISR", "CHN"]'
    steps:
      - id: set
        env:
          DISPATCH_COUNTRY: ${{ inputs.country }}
        run: |
          if [ -n "$DISPATCH_COUNTRY" ]; then
            # Manual single-country dispatch overrides the curated set.
            echo "focuses=[\"${DISPATCH_COUNTRY}\"]" >> "$GITHUB_OUTPUT"
          else
            echo "focuses=${COUNTRY_EDITIONS}" >> "$GITHUB_OUTPUT"
          fi

  compose-and-publish:
    needs: plan
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write          # so the "Archive to repo" step can commit
    strategy:
      fail-fast: false         # one country failing must not abort the others
      max-parallel: 1          # serialize so per-country ledger commits never race
      matrix:
        focus: ${{ fromJson(needs.plan.outputs.focuses) }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # Fetch the freshest CSV — look for the latest "data-*" GitHub Release
      # first (auto-created by refresh-data.yml on Mondays), fall back to
      # the static ATLAS_DATA_URL secret if no release exists yet.
      - name: Fetch UN voting CSV from latest data release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ATLAS_DATA_URL: ${{ secrets.ATLAS_DATA_URL }}
        run: |
          set -e
          mkdir -p data
          LATEST_TAG=$(gh release list --limit 100 \
            --json tagName,createdAt \
            -q '[.[] | select(.tagName | startswith("data-"))] | sort_by(.createdAt) | last.tagName')
          if [ -n "$LATEST_TAG" ]; then
            echo "Using latest data release: $LATEST_TAG"
            gh release download "$LATEST_TAG" --pattern "*.csv" --dir data --clobber
            # No-op if the downloaded asset is already named correctly.
            for f in data/*.csv; do
              if [ "$f" != "data/2025_03_31_ga_voting_corr1.csv" ]; then
                mv "$f" data/2025_03_31_ga_voting_corr1.csv
              fi
            done
          elif [ -n "$ATLAS_DATA_URL" ]; then
            echo "No data release yet; falling back to ATLAS_DATA_URL."
            curl -fSL "$ATLAS_DATA_URL" -o data/2025_03_31_ga_voting_corr1.csv
          else
            echo "::warning::No data source configured — workflow will exit."
            exit 0
          fi
          echo "Source CSV: $(wc -l < data/2025_03_31_ga_voting_corr1.csv) lines."

      - name: Fail loudly if data is stale
        if: ${{ hashFiles('data/*.csv') != '' }}
        run: |
          python - <<'PY'
          import sys
          from datetime import datetime, timezone
          import pandas as pd
          df = pd.read_csv("data/2025_03_31_ga_voting_corr1.csv", low_memory=False)
          latest = pd.to_datetime(df["date"], errors="coerce").max()
          days = (datetime.now(timezone.utc) - latest.tz_localize("UTC")).days
          print(f"Latest vote in CSV: {latest.date()} ({days} days ago)")
          if days > 90:
              print(f"::error::Data is {days} days old — refusing to publish stale newsletter.")
              sys.exit(1)
          PY

      - name: Compose edition
        if: ${{ hashFiles('data/*.csv') != '' }}
        env:
          RECENT_YEAR: ${{ inputs.recent_year }}
          BASELINE_WINDOW: ${{ inputs.baseline_window }}
          COUNTRY_FOCUS: ${{ matrix.focus }}
        run: |
          python - <<'PY'
          import json
          import os
          import sys

          sys.path.insert(0, ".")
          from src.config import UN_VOTES_CSV_PATH
          from src.country_display import display_lookup
          from src.data_processing import load_and_preprocess_data
          from src.newsletter import build_newsletter_edition
          from src.newsletter_archive import save_edition

          df, _ = load_and_preprocess_data(str(UN_VOTES_CSV_PATH))
          # Select recent_year EXACTLY as the Send step does: when no explicit
          # RECENT_YEAR override is given, pass None so build_newsletter_edition
          # auto-picks via pick_recent_year — which skips a sparse in-progress
          # year (e.g. a barely-started 2026 with a handful of resolutions).
          # Using df["year"].max() here while Send used the auto-pick made the
          # gate/ledger track a DIFFERENT edition than the one actually emailed,
          # so the gate kept firing on the churning latest-year edition while
          # the stable emailed edition went out unchanged every week — the
          # duplicate-email bug. Keep this in lockstep with the Send step.
          recent_year_env = (os.getenv("RECENT_YEAR") or "").strip()
          recent_year = int(recent_year_env) if recent_year_env else None
          baseline_window = int(os.getenv("BASELINE_WINDOW") or 3)
          country_focus = (os.getenv("COUNTRY_FOCUS") or "").strip().upper() or None

          # Use editorial display names (display_lookup) so the ARCHIVED
          # edition — which the Send step now emails verbatim — reads "Iran",
          # "North Korea", etc. rather than raw UN long-forms or bare codes.
          raw_names = {}
          if "country_name" in df.columns:
              names = df[["country_identifier", "country_name"]].dropna().drop_duplicates(
                  subset=["country_identifier"]
              )
              raw_names = {
                  str(r.country_identifier).strip().upper(): str(r.country_name)
                  for r in names.itertuples(index=False)
              }
          name_lookup = display_lookup(raw_names)
          edition = build_newsletter_edition(
              df, recent_year=recent_year,
              baseline_window_years=baseline_window,
              name_lookup=name_lookup,
              country_focus=country_focus,
          )
          written = save_edition(edition)
          out = {
              "slug": edition.edition_slug,
              "subject": edition.email_subject,
              "html_path": written["html"],
              "md_path": written["md"],
              "txt_path": written["txt"],
              "json_path": written["json"],
              "country_focus": edition.country_focus,
          }
          print(json.dumps(out, indent=2))
          os.makedirs(".github/atlas-out", exist_ok=True)
          with open(".github/atlas-out/edition.json", "w") as f:
              json.dump(out, f)
          PY

      - name: Skip-if-unchanged gate
        # "Publish only when data moves." Compares the freshly composed
        # edition's content_hash against the COMMITTED ledger
        # (data/published_ledger.json) — which, unlike the gitignored
        # data/editions/ archive, survives between CI runs. If the data
        # hasn't moved since the last edition we actually sent, skip.
        id: gate
        if: ${{ hashFiles('.github/atlas-out/edition.json') != '' }}
        run: |
          python - <<'PY'
          import json, os, sys
          sys.path.insert(0, ".")
          from src.newsletter_ledger import last_published

          this = json.load(open(".github/atlas-out/edition.json"))
          # The composer wrote {slug, subject, paths...} but not the hash.
          # Read it from the archived JSON of THIS run (save_edition wrote it).
          with open(this["json_path"]) as f:
              edition_obj = json.load(f)
          this_hash = edition_obj.get("content_hash")
          country_focus = edition_obj.get("country_focus") or None

          prior = last_published(country_focus)
          if prior and prior.get("content_hash") == this_hash:
              print(
                  f"::warning::Data unchanged since {prior['slug']} "
                  f"({prior.get('edition_date')}). Nothing to publish this week."
              )
              with open(os.environ["GITHUB_OUTPUT"], "a") as f:
                  f.write("skip=true\n")
              sys.exit(0)
          prev = prior["content_hash"][:12] + "…" if prior else "none"
          print(
              f"Data moved — hash {this_hash[:12]}… (last published {prev}). "
              f"OK to publish."
          )
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write("skip=false\n")
          PY

      - name: Send to Substack publication inbox
        if: ${{ inputs.dry_run != 'true' && steps.gate.outputs.skip != 'true' && hashFiles('.github/atlas-out/edition.json') != '' }}
        env:
          SMTP_HOST: ${{ secrets.ATLAS_SMTP_HOST }}
          SMTP_PORT: ${{ secrets.ATLAS_SMTP_PORT }}
          SMTP_USER: ${{ secrets.ATLAS_SMTP_USER }}
          SMTP_PASS: ${{ secrets.ATLAS_SMTP_PASS }}
          SUBSTACK_INBOX: ${{ secrets.ATLAS_SUBSTACK_INBOX }}
          SMTP_FROM: ${{ secrets.ATLAS_SMTP_FROM }}
          RECIPIENT_OVERRIDE: ${{ inputs.recipient_override }}
        run: |
          python - <<'PY'
          import json
          import os
          import smtplib
          import sys

          sys.path.insert(0, ".")
          required = ["SMTP_HOST", "SMTP_USER", "SMTP_PASS", "SMTP_FROM"]
          missing = [k for k in required if not os.environ.get(k)]
          if missing:
              raise SystemExit(f"Missing secrets: {missing}")
          to_addr = (
              os.environ.get("RECIPIENT_OVERRIDE")
              or os.environ.get("SUBSTACK_INBOX")
          )
          if not to_addr:
              raise SystemExit("No recipient: set ATLAS_SUBSTACK_INBOX or pass recipient_override.")

          from src.newsletter import edition_from_dict
          from src.newsletter_email import build_email_message

          # Reuse the EXACT edition Compose archived and the gate checked — do
          # NOT recompose. Recomposing here (with a separately-chosen
          # recent_year / name_lookup) is what let the emailed edition drift
          # away from the gated + recorded one, silently re-sending the same
          # edition every week. Loading the artifact guarantees the email, the
          # skip-gate, and the ledger all describe one identical edition — and
          # skips a second 362MB CSV parse.
          this = json.load(open(".github/atlas-out/edition.json"))
          with open(this["json_path"]) as f:
              edition = edition_from_dict(json.load(f))

          # Subject is action-oriented for the editor's inbox: "Ready to
          # publish" rather than the headline. The headline lives inside
          # the email body and inside the attached Markdown file (which
          # is what gets pasted into the Substack draft).
          msg = build_email_message(
              edition,
              sender=os.environ["SMTP_FROM"],
              recipient=to_addr,
              subject_override=(
                  f"📰 Ready to publish: {edition.publication} "
                  f"№{edition.edition_number}"
              ),
          )

          host = os.environ["SMTP_HOST"]
          port = int(os.environ.get("SMTP_PORT") or "465")
          with smtplib.SMTP_SSL(host, port) as s:
              s.login(os.environ["SMTP_USER"], os.environ["SMTP_PASS"])
              s.send_message(msg)
          print(f"Sent '{edition.email_subject}' to {to_addr}")
          PY

      # Only runs when we ACTUALLY sent (not dry-run, not skipped). Records
      # the edition's hash to the committed ledger and pushes it back, so
      # next week's gate remembers this was published and won't re-send the
      # same edition. This is the persistence that makes the skip gate work.
      - name: Record published edition + commit ledger
        if: ${{ inputs.dry_run != 'true' && steps.gate.outputs.skip != 'true' && hashFiles('.github/atlas-out/edition.json') != '' }}
        run: |
          python - <<'PY'
          import json, sys
          sys.path.insert(0, ".")
          from src.newsletter_ledger import record_published_dict
          this = json.load(open(".github/atlas-out/edition.json"))
          with open(this["json_path"]) as f:
              edition_obj = json.load(f)
          rec = record_published_dict(edition_obj)
          print(f"Ledger record: {rec['slug']} hash={rec['content_hash'][:12]}…")
          PY
          if git diff --quiet -- data/published_ledger.json; then
            echo "Ledger unchanged (edition already recorded) — nothing to commit."
            exit 0
          fi
          SLUG=$(python -c "import json;print(json.load(open('.github/atlas-out/edition.json'))['slug'])")
          git config user.name "atlas-bot"
          git config user.email "atlas-bot@users.noreply.github.com"
          git add data/published_ledger.json
          git commit -m "chore(ledger): record published edition ${SLUG}"
          # The edition has ALREADY been emailed by this point, so the ledger
          # MUST land — if the push is lost, next week's gate forgets this send
          # and re-mails the same edition (the bug this whole gate exists to
          # prevent). The concurrency group makes a racing push rare, not
          # impossible, so rebase onto any concurrent change and retry before
          # failing loudly.
          for attempt in 1 2 3; do
            if git pull --rebase --autostash origin "${GITHUB_REF_NAME}" && git push; then
              echo "Ledger pushed on attempt ${attempt}."
              exit 0
            fi
            echo "Push attempt ${attempt} failed (concurrent update?) — retrying in 5s."
            sleep 5
          done
          echo "::error::Could not push ledger after 3 attempts; next run may re-send edition ${SLUG}."
          exit 1

      - name: Publish result summary
        # Always runs so every week's outcome is visible at a glance in the
        # run summary — published / skipped / dry-run / failed. Closes the
        # "the gate skips silently and nobody notices" gap. GitHub already
        # emails the owner on outright workflow failure.
        if: ${{ always() }}
        env:
          GATE_SKIP: ${{ steps.gate.outputs.skip }}
          DRY_RUN: ${{ inputs.dry_run }}
          JOB_STATUS: ${{ job.status }}
        run: |
          python - <<'PY'
          import json, os

          skip = os.environ.get("GATE_SKIP")
          dry = os.environ.get("DRY_RUN") == "true"
          status = os.environ.get("JOB_STATUS")  # success / failure / cancelled

          slug = subject = focus = None
          try:
              with open(".github/atlas-out/edition.json") as f:
                  meta = json.load(f)
              slug, subject, focus = meta.get("slug"), meta.get("subject"), meta.get("country_focus")
          except OSError:
              pass

          if status == "failure":
              outcome = "❌ **Failed** — see the step logs above."
          elif slug is None:
              outcome = "⚠️ **No edition composed** (no data source configured, or data missing)."
          elif dry:
              outcome = f"🧪 **Dry run** — composed `{slug}`, no email sent."
          elif skip == "true":
              outcome = "⏭️ **Skipped** — data unchanged since the last published edition; no email sent."
          elif skip == "false":
              outcome = f"📤 **Published** `{slug}` — emailed to the Substack inbox and recorded in the ledger."
          else:
              outcome = f"ℹ️ Composed `{slug}` (outcome undetermined)."

          lines = ["## Weekly Atlas — publish result", "", outcome, ""]
          if slug:
              lines += [
                  f"- **Edition:** `{slug}`",
                  f"- **Focus:** {focus or 'global'}",
                  f"- **Subject:** {subject or '—'}",
              ]
          summary = "\n".join(lines) + "\n"
          with open(os.environ["GITHUB_STEP_SUMMARY"], "a") as f:
              f.write(summary)
          print(summary)
          PY

      - name: Upload edition as workflow artifact
        if: ${{ hashFiles('.github/atlas-out/edition.json') != '' }}
        uses: actions/upload-artifact@v7
        with:
          # Per-matrix-job name so country editions don't collide on upload.
          name: weekly-atlas-edition-${{ matrix.focus || 'global' }}
          path: data/editions/
